name: Recherche des identifiants registre

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  find-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lancer la recherche
        run: python find_ids.py

      - name: Sauvegarder le résultat dans le dépôt
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/matches.json
          git commit -m "Mise à jour des correspondances registre" || echo "Rien à sauvegarder"
          git push

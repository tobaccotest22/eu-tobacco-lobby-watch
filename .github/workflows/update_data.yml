name: Mise à jour quotidienne des données live

permissions:
  contents: write

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: LobbyFacts + réunions Commission
        run: python scripts/fetch_lobbyfacts.py

      - name: Réunions Parlement européen
        run: python scripts/fetch_ep_meetings.py

      - name: Historique du budget LobbyFacts
        run: python scripts/fetch_budget_history.py

      - name: Réunions Parlement par recherche mot-clé (hors organisations suivies)
        run: python scripts/fetch_keyword_meetings.py

      - name: Sauvegarder le résultat dans le dépôt
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/live_data.json data/budget_history.json
          git commit -m "Mise à jour quotidienne des données live" || echo "Rien à sauvegarder"
          git push
